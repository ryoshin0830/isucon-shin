upstream app {
  server 127.0.0.1:8080;
  keepalive 128;
}

server {
  listen 80;

  client_max_body_size 10m;
  root /home/isucon/private_isu/webapp/public/;

  # static assets served directly by nginx
  location ~ ^/(favicon\.ico|css/|js/|img/) {
    expires 1d;
    access_log off;
  }

  # images: serve from disk if dumped, else fall back to app (which writes the file)
  location /image/ {
    expires 1d;
    try_files $uri @app;
  }

  location @app {
    proxy_set_header Host $host;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_pass http://app;
  }

  location / {
    proxy_set_header Host $host;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_pass http://app;
  }
}
